<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Band Gap Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
margin:40px;
}
h1{
color:#333;
}
button{
padding:10px 20px;
font-size:16px;
}
</style>

</head>

<body>

<h1>能隙 (Band Gap) 自动计算工具</h1>

<p>给中山医公卫学生使用</p>

<p>
上传 UH5700 %R 数据文件
</p>

<input type="file" id="fileInput">

<br><br>

<button onclick="process()">计算 Eg</button>

<h2 id="result"></h2>

<canvas id="chart" width="800" height="400"></canvas>

<script>

function process(){

const file = document.getElementById('fileInput').files[0];

const reader = new FileReader();

reader.onload=function(e){

const text=e.target.result;

const lines=text.split('\n');

let hv=[];
let y=[];

for(let line of lines){

let parts=line.trim().split(/\s+/);

if(parts.length==2){

let wl=parseFloat(parts[0]);
let R=parseFloat(parts[1]);

if(!isNaN(wl)&&!isNaN(R)){

R=R/100;

let F=((1-R)*(1-R))/(2*R);

let energy=1240/wl;

hv.push(energy);

y.push(Math.sqrt(F*energy));

}

}

}

draw(hv,y);

let Eg=estimateEg(hv,y);

let msg="Eg = "+Eg.toFixed(3)+" eV";

if(Eg<1||Eg>4){
msg+="  ⚠ 请找老师讨论";
}

document.getElementById("result").innerText=msg;

};

reader.readAsText(file);

}

function estimateEg(x,y){

let maxSlope=0;
let Eg=0;

for(let i=1;i<x.length;i++){

let slope=(y[i]-y[i-1])/(x[i]-x[i-1]);

if(slope>maxSlope){
maxSlope=slope;
Eg=x[i]-y[i]/slope;
}

}

return Eg;

}

function draw(x,y){

new Chart(document.getElementById("chart"),{

type:'line',

data:{
labels:x,
datasets:[{
label:'Tauc Plot',
data:y,
borderColor:'blue',
fill:false
}]
},

options:{
scales:{
x:{title:{display:true,text:'hv (eV)'}},
y:{title:{display:true,text:'(F(R)hv)^1/2'}}
}
}

});

}

</script>

</body>
</html>
